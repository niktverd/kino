name: "Покемон. Детектив Пикачу (2019)"
description: "Парень приезжает в мегаполис, чтобы найти пропавшего отца-полицейского. Ему начинает помогать Пикачу (с повадками и юмором Райана Рейнольдса, который его озвучивал). Они допрашивают свидетелей, ищут зацепки в лабораториях и распутывают заговор."
