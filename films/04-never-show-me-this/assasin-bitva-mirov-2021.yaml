name: "Ассасин: Битва миров (2021)"
description: "Писатель создает роман о фантастическом мире, где юный воин бросает вызов жестокому богу-императору. Но внезапно события из книги начинают происходить в реальном мире. Отца похищенной девочки нанимают убить писателя, чтобы остановить магию."
opinion: Слишком жестокий, убогая графика, слабый сюжет