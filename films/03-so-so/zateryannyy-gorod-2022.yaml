name: "Затерянный город (2022)"
description: "Писательницу (Сандра Буллок) похищает эксцентричный миллиардер (Дэниел Рэдклифф, Гарри Поттер!), чтобы она нашла сокровища затерянного города, о котором писала в книгах. Спасать её отправляется модель с обложки её книг (Ченнинг Татум), который в жизни совсем не герой. Также там есть шикарное камео Брэда Питта."
opinion: "Слабый сюжет. Тупые шутки и диалоги"