name: "Аргайл: Супершпион (2024)"
description: "Популярная писательница шпионских романов внезапно понимает, что сюжеты ее книг начинают сбываться в реальности. За ней начинает охоту настоящий тайный синдикат, а спасает ее реальный (и очень эксцентричный) шпион."
opinion: "Сюжет слабый, но картинка красивая."
