name: "Призрак (2010)"
description: "Интеллектуальный политический триллер от Романа Полански. Писатель-призрак нанят для завершения мемуаров бывшего премьер-министра Великобритании и оказывается втянут в опасный заговор. Как и в «Костюме», здесь всё держится на деталях, профессионализме героя и гнетущей атмосфере изолированного особняка."
