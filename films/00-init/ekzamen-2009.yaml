name: "Экзамен (2009)"
description: "Эталонный камерный триллер. Восемь кандидатов на престижную должность заперты в одной комнате. У них есть 80 минут и один вопрос, на который нужно ответить. Но лист бумаги пуст. Фильм о логике, человеческой психологии и умении видеть то, что скрыто от остальных."
