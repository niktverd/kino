name: "Ковбои против пришельцев (2011)"
description: "1873 год, Дикий Запад. В пустыне просыпается человек (Дэниэл Крэйг), потерявший память, но с высокотехнологичным металлическим браслетом на руке. Вскоре на городок нападают инопланетные корабли, и ковбоям приходится объединиться с индейцами, чтобы дать отпор."
