name: "Одиннадцать друзей Оушена (2001)"
description: "Это ограбление, где всё рассчитано до миллисекунды. Команда обходит сложнейшие системы безопасности, используя элегантные обманки, психологию и передовые технологии. Никакой грубой силы — только изящество и математический расчет. Зритель до самого конца не понимает всех тонкостей замысла."
