name: "Иллюзия обмана (2013)"
description: "Команда из четырех невероятно талантливых иллюзионистов прямо во время своих шоу проворачивает дерзкие ограбления банков (например, телепортируют человека в хранилище в Париже), а деньги раздают зрителям. Агент ФБР пытается разгадать их трюки и поймать их, но они всегда на шаг впереди."
