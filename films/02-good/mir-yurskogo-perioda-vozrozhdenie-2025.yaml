name: "Мир Юрского периода: Возрождение (2025)"
description: "Спустя годы после того, как динозавры вырвались на свободу, планета стала для них непригодной. Они выживают только в экваториальных джунглях. Команда наемников должна проникнуть в эту опасную зону, чтобы добыть ДНК для создания лекарства."
