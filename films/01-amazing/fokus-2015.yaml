name: "Фокус (2015)"
description: "Сюжет работает по принципу «отвлечения внимания». Главные герои (Уилл Смит и Марго Робби) проворачивают невероятно сложные, многоуровневые схемы. Зрителя обводят вокруг пальца так же изящно, как и жертв на экране. Развязка заставит вас мысленно перемотать фильм назад, чтобы понять, как филигранно всё было спланировано."
