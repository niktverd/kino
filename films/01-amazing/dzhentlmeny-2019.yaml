name: "Джентльмены (2019)"
description: "Весь фильм — это гениальный пазл. Ушлый журналист приходит к правой руке мафиози и начинает рассказывать ему сценарий фильма, который на самом деле является шантажом. История постоянно перематывается, рассказчик хитрит, а зритель собирает картину по кусочкам."
