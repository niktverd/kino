name: "Шан-Чи и легенда десяти колец (2021)"
description: "Вы любите «Аладдина» (восточный колорит, магия), «Аквамена» (эпичные битвы с монстрами) и «Варкрафт». В «Шан-Чи» безумно красивый мир с драконами и мифическими существами, а финальная битва по масштабу не уступает «Властелину Колец». Картинка очень сочная."
