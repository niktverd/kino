name: "Лучшее предложение (2013)"
description: "Главный герой — управляющий престижного аукционного дома, надменный интеллектуал, который с первого взгляда отличает подделку от подлинника. Однажды таинственная клиентка, которая никогда не выходит из своей комнаты, просит его оценить антиквариат на ее заброшенной вилле."
