name: "Невидимый гость (2016)"
description: "Молодой и очень успешный бизнесмен просыпается в закрытом изнутри номере дорогого отеля рядом с бездыханным телом своей любовницы. Он нанимает лучшего в стране адвоката по подготовке свидетелей. У них есть всего три часа до суда, чтобы выстроить идеальную линию защиты и найти неувязки в деле. Весь фильм — это их напряженный диалог, где версии событий постоянно меняются."
