name: "Оз: Великий и Ужасный (2013)"
description: "Мелкий цирковой фокусник (Джеймс Франко) попадает через ураган в волшебную страну Оз. Местные жители думают, что он великий маг, который должен спасти их от злых ведьм. Ему приходится использовать свои трюки и изобретения, чтобы имитировать магию."
