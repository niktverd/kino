name: "Игра на вылет (2007), сыщик 2007"
description: "Пожилой, баснословно богатый автор детективных романов (Майкл Кейн) приглашает к себе в загородный особняк молодого безработного актера (Джуд Лоу), который увел у него жену. Писатель предлагает ему сделку: актер должен инсценировать ограбление дома, чтобы получить страховку."
