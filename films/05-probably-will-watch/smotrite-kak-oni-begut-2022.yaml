name: "Смотрите, как они бегут (2022)"
description: "Это классический детектив (в духе Агаты Кристи), но снятый очень свежо. В театре Лондона во время празднования юбилейного спектакля убивают режиссера. За дело берутся уставший инспектор и чрезмерно энтузиастичная девушка-стажер. Зрителю дают все улики, чтобы догадаться самому."
