name: "Лига выдающихся джентльменов (2003)"
description: "Конец XIX века. Кто-то пытается стравить мировые державы и начать мировую войну с помощью высокотехнологичного оружия. Чтобы остановить злодея, Британская империя собирает отряд из литературных героев: охотника Аллана Куотермейна (Шон Коннери), капитана Немо, Человека-невидимки, вампирши и Тома Сойера."
